<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lite Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        video { width: 100%; height: 60%; object-fit: cover; background: black; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 60%; pointer-events: none; }
        
        #ui-panel { 
            height: 40%; width: 100%; background: #1e1e1e; 
            padding: 15px; box-sizing: border-box; overflow-y: auto;
            border-top: 2px solid #333;
        }
        .result-item { margin-bottom: 10px; padding: 8px; background: #2d2d2d; border-radius: 5px; }
        .label { color: #00ff88; font-size: 0.8rem; font-weight: bold; }
        .value { font-size: 1.1rem; display: block; }
        .pinyin { color: #ffcc00; font-style: italic; font-size: 0.9rem; }
        
        .controls { 
            position: absolute; bottom: 62%; left: 50%; transform: translateX(-50%);
            z-index: 10;
        }
        button {
            padding: 12px 20px; border-radius: 50px; border: none;
            background: #00ff88; color: black; font-weight: bold;
        }
        button:disabled { background: #555; }

        /* BARRA DE CARGA */
        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px;
        }
        .progress-container { width: 80%; background: #333; height: 10px; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff88; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <h2 id="loading-text">Iniciando IA...</h2>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <p id="loading-subtext" style="font-size: 0.8rem; color: #888;">Descargando modelos ligeros...</p>
</div>

<div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="controls"><button id="capture-btn">ANALIZAR</button></div>
    <div id="ui-panel">
        <div class="result-item"><span class="label">OBJETO:</span><span id="obj-val" class="value">-</span></div>
        <div class="result-item"><span class="label">TEXTO:</span><span id="ocr-val" class="value">-</span></div>
        <div class="result-item"><span class="label">CHINO:</span><span id="trans-val" class="value">-</span><span id="pinyin-val" class="pinyin"></span></div>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const captureBtn = document.getElementById('capture-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const loadingSubtext = document.getElementById('loading-subtext');
    const progressBar = document.getElementById('progress-bar');

    let objectModel, translator;

    async function updateProgress(text, percent) {
        loadingText.innerText = text;
        progressBar.style.width = percent + '%';
        loadingSubtext.innerText = `Progreso: ${Math.round(percent)}%`;
    }

    async function init() {
        try {
            // 1. Carga de Objetos
            await updateProgress("Cargando Detector...", 10);
            objectModel = await cocoSsd.load();

            // 2. Carga de Traducción (USANDO MODELO CUANTIZADO Y MÁS PEQUEÑO)
            // Usamos un callback para la barra de progreso
            await updateProgress("Cargando Traductor (esto tarda)...", 30);
            
            translator = await pipeline('translation', 'Xenova/m2m100_418M', {
                progress_callback: (data) => {
                    if (data.status === 'progress') {
                        // Ajustamos el porcentaje para que se vea fluido entre 30% y 90%
                        let p = 30 + (data.progress * 0.6);
                        updateProgress("Descargando modelos...", p);
                    }
                }
            });

            await updateProgress("Configurando Cámara...", 95);
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                updateProgress("¡Listo!", 100);
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            };

        } catch (e) {
            loadingText.innerText = "Error de Memoria";
            loadingSubtext.innerText = "Tu móvil no tiene suficiente RAM para este modelo. Prueba en PC o usa una versión más ligera.";
            console.error(e);
        }
    }

    async function detectObjects() {
        const predictions = await objectModel.detect(video);
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (predictions.length > 0) {
            document.getElementById('obj-val').innerText = predictions[0].class;
            ctx.strokeStyle = "#00ff88";
            ctx.lineWidth = 4;
            ctx.strokeRect(predictions[0].bbox[0], predictions[0].bbox[1], predictions[0].bbox[2], predictions[0].bbox[3]);
        } else {
            document.getElementById('obj-val').innerText = "No detectado";
        }
    }

    async function runOCRAndTranslate() {
        captureBtn.disabled = true;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        tempCanvas.getContext('2d').drawImage(video, 0, 0);

        try {
            const { data: { text } } = await Tesseract.recognize(tempCanvas, 'eng');
            const cleanText = text.trim();
            document.getElementById('ocr-val').innerText = cleanText || "Sin texto";

            if (cleanText) {
                document.getElementById('trans-val').innerText = "Traduciendo...";
                const output = await translator(cleanText, { tgt_lang: 'zh' });
                document.getElementById('trans-val').innerText = output[0].translation_text;
            }
        } catch (err) {
            document.getElementById('ocr-val').innerText = "Error en proceso";
        }
        captureBtn.disabled = false;
    }

    captureBtn.addEventListener('click', async () => {
        await detectObjects();
        await runOCRAndTranslate();
    });

    init();
</script>
</body>
</html>

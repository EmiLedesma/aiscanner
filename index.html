<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scanner Pro (Cloud Powered)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        video { width: 100%; height: 55%; object-fit: cover; background: black; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 55%; pointer-events: none; }
        
        #ui-panel { 
            height: 45%; width: 100%; background: #1e1e1e; 
            padding: 15px; box-sizing: border-box; overflow-y: auto;
            border-top: 2px solid #333;
        }
        .result-item { margin-bottom: 12px; padding: 10px; background: #2d2d2d; border-radius: 8px; border-left: 4px solid #00ff88; }
        .label { color: #00ff88; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .value { font-size: 1.1rem; display: block; margin-top: 4px; min-height: 1.2em; }
        .pinyin { color: #ffcc00; font-style: italic; font-size: 0.9rem; margin-top: 4px; display: block; }
        
        .controls { 
            position: absolute; bottom: 58%; left: 50%; transform: translateX(-50%);
            z-index: 10;
        }
        button {
            padding: 15px 30px; border-radius: 50px; border: none;
            background: #00ff88; color: black; font-weight: bold; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,255,136,0.4);
        }
        button:disabled { background: #555; box-shadow: none; }

        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px;
        }
        .progress-container { width: 70%; background: #333; height: 8px; border-radius: 4px; margin-top: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00ff88; transition: width 0.3s; }
        .status-msg { font-size: 0.9rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <h2 id="loading-text">Iniciando IA...</h2>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <p id="loading-subtext" class="status-msg">Preparando motores...</p>
</div>

<div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    
    <div class="controls">
        <button id="capture-btn">ANALIZAR AHORA</button>
    </div>

    <div id="ui-panel">
        <div class="result-item">
            <span class="label">Objeto Detectado</span>
            <span id="obj-val" class="value">Esperando...</span>
        </div>
        <div class="result-item">
            <span class="label">Texto Escaneado</span>
            <span id="ocr-val" class="value">Esperando...</span>
        </div>
        <div class="result-item">
            <span class="label">Traducción al Chino</span>
            <span id="trans-val" class="value">-</span>
            <span id="pinyin-val" class="pinyin"></span>
        </div>
    </div>
</div>

<script type="module">
    // CONFIGURACIÓN DE OPENROUTER
    const OPENROUTER_API_KEY = "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";
    const MODEL_NAME = "google/gemini-flash-1.5-8b"; // Modelo ultra rápido y barato

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const captureBtn = document.getElementById('capture-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const loadingSubtext = document.getElementById('loading-subtext');
    const progressBar = document.getElementById('progress-bar');

    const objVal = document.getElementById('obj-val');
    const ocrVal = document.getElementById('ocr-val');
    const transVal = document.getElementById('trans-val');
    const pinyinVal = document.getElementById('pinyin-val');

    let objectModel;

    const breathe = () => new Promise(resolve => setTimeout(resolve, 100));

    async function updateProgress(text, percent, subtext = "") {
        loadingText.innerText = text;
        progressBar.style.width = percent + '%';
        if(subtext) loadingSubtext.innerText = subtext;
    }

    async function init() {
        try {
            await updateProgress("Iniciando...", 10, "Cargando detección de objetos...");
            objectModel = await cocoSsd.load();

            await updateProgress("Cargando...", 50, "Configurando cámara...");
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                updateProgress("¡Listo!", 100, "Todo preparado.");
                setTimeout(() => loadingOverlay.style.display = 'none', 800);
            };
        } catch (e) {
            loadingText.innerText = "Error";
            loadingSubtext.innerText = "Asegúrate de dar permiso a la cámara.";
            console.error(e);
        }
    }

    // FUNCIÓN PARA LLAMAR A OPENROUTER
    async function translateWithOpenRouter(text) {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                    "HTTP-Referer": window.location.href, 
                    "X-Title": "AI Scanner App",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": MODEL_NAME,
                    "messages": [
                        {
                            "role": "system",
                            "content": "You are a professional translator. Translate the text to Chinese characters. ALWAYS provide the Pinyin in parentheses immediately after the characters. Format: Characters (Pinyin). Example: 你好 (nǐ hǎo). Do not add any other text."
                        },
                        {
                            "role": "user",
                            "content": `Translate this: ${text}`
                        }
                    ]
                })
            });

            const data = await response.json();
            const result = data.choices[0].message.content.trim();
            
            // Separar caracteres de Pinyin con una lógica simple
            // Buscamos el paréntesis para separar
            if (result.includes('(')) {
                const parts = result.split('(');
                return {
                    chars: parts[0].trim(),
                    pinyin: parts[1].replace(')', '').trim()
                };
            }
            return { chars: result, pinyin: "" };

        } catch (error) {
            console.error("Error en OpenRouter:", error);
            throw error;
        }
    }

    async function analyze() {
        captureBtn.disabled = true;

        try {
            // 1. DETECCIÓN DE OBJETOS (Local)
            objVal.innerText = "Analizando...";
            const predictions = await objectModel.detect(video);
            
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (predictions.length > 0) {
                objVal.innerText = predictions[0].class;
                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 4;
                ctx.strokeRect(predictions[0].bbox[0], predictions[0].bbox[1], predictions[0].bbox[2], predictions[0].bbox[3]);
            } else {
                objVal.innerText = "No detectado";
            }

            await breathe();

            // 2. OCR (Local)
            ocrVal.innerText = "Escaneando texto...";
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);

            const { data: { text } } = await Tesseract.recognize(tempCanvas, 'eng');
            const cleanText = text.trim();
            ocrVal.innerText = cleanText || "Sin texto";

            if (cleanText) {
                await breathe();

                // 3. TRADUCCIÓN (Cloud via OpenRouter)
                transVal.innerText = "Traduciendo...";
                pinyinVal.innerText = "";
                
                const translation = await translateWithOpenRouter(cleanText);
                
                transVal.innerText = translation.chars;
                pinyinVal.innerText = translation.pinyin;
            } else {
                transVal.innerText = "-";
            }

        } catch (err) {
            console.error(err);
            objVal.innerText = "Error";
            ocrVal.innerText = "Error en proceso";
        } finally {
            captureBtn.disabled = false;
        }
    }

    captureBtn.addEventListener('click', analyze);
    init();
</script>

</body>
</html>
